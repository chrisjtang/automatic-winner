<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Automatic Winner</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
        }
        .navbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            background: #111;
            color: #fff;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .navbar a[aria-current="page"] {
            background: rgba(255, 255, 255, 0.18);
        }
        .navbar-brand {
            font-weight: 600;
            margin-right: auto;
        }
        main {
            padding: 32px 24px;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand">Automatic Winner</span>
        <a href="./" aria-current="page">Home</a>
        <a href="./forums/">Forums</a>
    </nav>
    <main>
        <h1>Home</h1>
        <p>Placeholder text for the homepage.</p>
    </main>
</body>
</html>
